<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presupuesto</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header class="header">

    <div class="logo">
        <img src="../images/logok9.png" alt="Logo MalinoisK9">
    </div>

    <nav class="menu">
        <ul>
            <li><a href="../index.html">Inicio</a></li>
            <li><a href="productos.html">Entrenamiento</a></li>
            <li><a href="presupuesto.html">Presupuesto</a></li>
            <li><a href="contacto.html">Contacto</a></li>
            
        </ul>
    </nav>

</header>

<h1>Solicitar presupuesto</h1>

<form id="formulario">

    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Email" required>

    <select required>
        <option value="">Tipo de entrenamiento</option>
        <option>Básico</option>
        <option>Avanzado</option>
        <option>Protección</option>
    </select>

    <input type="number" placeholder="Días" min="1" required>

    <label>
        <input type="checkbox" required>
        Acepto la política de privacidad
    </label>

    <button type="submit">Enviar</button>

</form>

<p id="mensaje-exito">Sus datos han sido enviados correctamente</p>

<script>
document.getElementById("formulario").addEventListener("submit", function(event) {
    event.preventDefault();
    document.getElementById("mensaje-exito").style.display = "block";
    this.reset();
});
</script>

</body>
</html>
